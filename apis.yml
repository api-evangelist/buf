aid: buf
name: Buf
description: >-
  Buf is a modern developer platform for Protocol Buffers and gRPC, providing
  a CLI toolchain, schema registry, and streaming infrastructure. It replaces
  traditional protoc-based workflows with linting, breaking change detection,
  code generation, remote plugins, and the Buf Schema Registry (BSR) for
  centralized schema distribution. Buf also offers Bufstream, a Kafka-compatible
  streaming platform built on Protobuf. Used by enterprises including EA, Intel,
  IBM, OpenAI, and Okta.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/buf/refs/heads/main/apis.yml
created: '2026-03-25'
modified: '2026-04-21'
specificationVersion: '0.19'
tags:
  - Code Generation
  - gRPC
  - Kafka
  - Open Source
  - Protocol Buffers
  - Schema Registry
  - SDKs
  - Streaming
apis:
  - aid: buf:buf-schema-registry
    name: Buf Schema Registry (BSR)
    description: >-
      The Buf Schema Registry (BSR) is a centralized repository for managing,
      distributing, and documenting Protobuf schemas. It provides dependency
      management, generated SDKs in multiple languages, remote plugins for code
      generation, and a Reflection API for runtime schema discovery.
    humanURL: https://buf.build/product/bsr
    tags:
      - Code Generation
      - Protocol Buffers
      - Schema Registry
      - SDKs
    properties:
      - type: Documentation
        url: https://buf.build/docs/bsr/
      - type: Getting Started
        url: https://buf.build/docs/bsr/introduction/
      - type: Authentication
        url: https://buf.build/docs/bsr/authentication/
      - type: Reference
        url: https://buf.build/docs/reference/
  - aid: buf:buf-cli
    name: Buf CLI
    description: >-
      The Buf CLI is a local Protobuf development toolchain providing linting,
      breaking change detection, code generation, formatting, dependency
      management, and schema push/pull to the Buf Schema Registry. It replaces
      protoc with a faster, more developer-friendly interface.
    humanURL: https://buf.build/product/cli
    tags:
      - CLI
      - Code Generation
      - Linting
      - Protocol Buffers
    properties:
      - type: Documentation
        url: https://buf.build/docs/cli/
      - type: Getting Started
        url: https://buf.build/docs/tutorials/getting-started-with-buf-cli
      - type: GitHubRepository
        url: https://github.com/bufbuild/buf
  - aid: buf:bufstream
    name: Bufstream
    description: >-
      Bufstream is a Kafka-compatible streaming platform built on Protocol
      Buffers. It provides schema enforcement, Iceberg integration, and
      administrative tooling for managing Kafka-compatible streaming workloads
      with Protobuf as the data format.
    humanURL: https://buf.build/product/bufstream
    tags:
      - Kafka
      - Protocol Buffers
      - Streaming
    properties:
      - type: Documentation
        url: https://buf.build/docs/bufstream/
      - type: Getting Started
        url: https://buf.build/docs/bufstream/introduction/
