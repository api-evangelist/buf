aid: buf
name: Buf
description: >-
  Buf is a modern toolchain for Protocol Buffers and gRPC, providing linting,
  breaking change detection, code generation, and a schema registry (BSR) for
  managing Protobuf schemas. It replaces traditional protoc-based workflows
  with a faster, more reliable developer experience.
